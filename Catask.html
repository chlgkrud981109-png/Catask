<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catask</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
:root{
  --bg:#f7f9fb;--white:#fff;--border:#e2e8ed;--border2:#cdd5db;
  --text:#2c3437;--sub:#596064;--muted:#9ba5aa;
  --primary:#545f74;--primary-light:#dde5f5;
  --col-todo:#F2F4F6;--col-prog:#FFF4E5;--col-done:#E8F5E9;--col-block:#FFE9E9;
  --red:#a83836;--green:#22c55e;--amber:#f59e0b;
}
body{background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column;}

/* ── 헤더 ── */
header{
  height:56px;padding:0 24px;
  display:flex;align-items:center;justify-content:space-between;
  background:var(--white);border-bottom:1px solid var(--border);
  flex-shrink:0;position:sticky;top:0;z-index:50;
}
.logo-area{display:flex;align-items:center;gap:10px;}
.mascot-wrap{position:relative;cursor:pointer;}
.mascot-img{
  width:36px;height:36px;border-radius:50%;object-fit:cover;
  border:2px solid var(--border);transition:filter .3s,border-color .3s;
}
.mascot-badge{
  position:absolute;bottom:-2px;right:-2px;
  font-size:10px;line-height:1;display:none;
}
.logo-text{font-size:16px;font-weight:700;color:var(--primary);letter-spacing:-.3px;}
.hdr-date{font-size:12px;color:var(--muted);font-weight:500;}
.hdr-right{display:flex;align-items:center;gap:14px;}
.prog-wrap{display:flex;align-items:center;gap:8px;}
.prog-bar-bg{width:88px;height:5px;background:#e2e8ed;border-radius:3px;overflow:hidden;}
.prog-bar-fill{height:100%;background:var(--primary);border-radius:3px;transition:width .4s;}
.prog-txt{font-size:12px;color:var(--sub);font-weight:500;min-width:36px;}
.btn-new{
  padding:7px 14px;background:var(--primary);color:#fff;
  border:none;border-radius:8px;font-size:13px;font-weight:600;
  cursor:pointer;display:flex;align-items:center;gap:5px;transition:opacity .15s;
}
.btn-new:hover{opacity:.85;}
.btn-new-icon{font-size:16px;line-height:1;}

/* ── 보드 ── */
.board{
  flex:1;display:flex;gap:16px;padding:20px;
  overflow-x:auto;overflow-y:hidden;align-items:flex-start;
}
.board::-webkit-scrollbar{height:4px;}
.board::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

/* ── 컬럼 ── */
.col{
  width:280px;flex-shrink:0;display:flex;flex-direction:column;
  border-radius:14px;overflow:hidden;
  max-height:calc(100vh - 96px);
}
.col-todo{background:var(--col-todo);}
.col-prog{background:var(--col-prog);}
.col-done{background:var(--col-done);}
.col-block{background:var(--col-block);}

.col-head{
  padding:12px 14px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:5;
}
.col-todo .col-head{background:var(--col-todo);}
.col-prog .col-head{background:var(--col-prog);}
.col-done .col-head{background:var(--col-done);}
.col-block .col-head{background:var(--col-block);}

.col-title-wrap{display:flex;align-items:center;gap:5px;}
.col-title{font-size:13px;font-weight:700;color:var(--text);}
.col-block-icon{font-size:13px;color:var(--red);}
.col-cnt{
  background:var(--white);color:var(--sub);
  font-size:11px;font-weight:700;
  padding:2px 7px;border-radius:20px;
  box-shadow:0 1px 3px rgba(0,0,0,.06);
}

.col-body{
  flex:1;overflow-y:auto;padding:0 10px;
  display:flex;flex-direction:column;gap:8px;
}
.col-body::-webkit-scrollbar{width:3px;}
.col-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.col-body.drag-over{
  outline:2px dashed var(--border2);
  outline-offset:-4px;border-radius:8px;
}

/* 빈 상태 */
.col-empty{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:20px;gap:6px;opacity:.4;
}
.col-empty-img{width:32px;height:32px;border-radius:50%;object-fit:cover;}
.col-empty-txt{font-size:11px;color:var(--muted);}

/* 추가 버튼 */
.col-add{
  margin:6px 10px 10px;padding:8px;
  border:1.5px dashed var(--border2);border-radius:10px;
  background:transparent;color:var(--muted);
  font-size:12px;font-weight:500;cursor:pointer;
  transition:all .15s;
}
.col-add:hover{border-color:var(--border2);color:var(--sub);background:rgba(255,255,255,.5);}

/* ── 카드 ── */
.card{
  background:var(--white);border-radius:12px;padding:12px;
  border:1px solid rgba(0,0,0,.06);
  box-shadow:0 1px 6px rgba(44,52,55,.06);
  cursor:pointer;position:relative;
  transition:transform .15s,box-shadow .15s;
  animation:cardIn .2s ease both;
}
.card:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(44,52,55,.1);}
.card.dragging{opacity:.3;transform:scale(.97);}
.prog-line{
  position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--primary),#7b9cde);
  border-radius:12px 12px 0 0;
}
@keyframes cardIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;}
.card-tag{
  font-size:10px;font-weight:600;padding:2px 8px;
  border-radius:20px;letter-spacing:.3px;
}
.tag-Design{background:#dde8ff;color:#3a4e8c;}
.tag-Dev{background:#dde5f5;color:#3b4d6b;}
.tag-Content{background:#e8deff;color:#4d3a7c;}
.tag-Infra{background:#ffdede;color:#7c2a2a;}
.tag-Research{background:#e0e6ea;color:#495760;}
.tag-Meeting{background:#fdecd0;color:#8c5c1a;}

.card-open-btn{
  opacity:0;background:var(--bg);border:1px solid var(--border);
  border-radius:5px;width:22px;height:22px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:12px;color:var(--sub);
  transition:all .15s;flex-shrink:0;
}
.card:hover .card-open-btn{opacity:1;}
.card-open-btn:hover{background:var(--primary);color:#fff;border-color:var(--primary);}

.card-title{
  font-size:13px;font-weight:600;color:var(--text);
  line-height:1.45;margin-bottom:6px;
}
.card-title.done-title{text-decoration:line-through;color:var(--muted);}
.card-notes{
  font-size:11px;color:var(--sub);line-height:1.5;
  margin-bottom:6px;
  overflow:hidden;display:-webkit-box;
  -webkit-line-clamp:2;-webkit-box-orient:vertical;
}
.card-footer{
  display:flex;align-items:center;
  margin-top:6px;padding-top:6px;
  border-top:1px solid rgba(0,0,0,.05);
}
.card-prio-high{font-size:11px;font-weight:600;color:var(--red);display:flex;align-items:center;gap:3px;}
.card-done-badge{font-size:11px;font-weight:600;color:var(--green);display:flex;align-items:center;gap:3px;margin-left:auto;}

/* ── 패널 ── */
.panel-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.2);
  z-index:100;display:flex;justify-content:flex-end;
  opacity:0;pointer-events:none;transition:opacity .2s;
  backdrop-filter:blur(3px);
}
.panel-overlay.show{opacity:1;pointer-events:all;}
.panel{
  width:380px;height:100%;background:var(--white);
  border-left:1px solid var(--border);
  display:flex;flex-direction:column;
  transform:translateX(16px);transition:transform .25s;
  box-shadow:-8px 0 32px rgba(0,0,0,.08);
}
.panel-overlay.show .panel{transform:translateX(0);}
.panel-head{
  padding:16px 20px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
}
.panel-close{
  width:28px;height:28px;border-radius:7px;
  border:1px solid var(--border);background:transparent;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;cursor:pointer;color:var(--sub);transition:all .15s;
}
.panel-close:hover{background:var(--bg);color:var(--text);}
.panel-title-input{
  flex:1;border:none;background:transparent;
  font-size:15px;font-weight:600;color:var(--text);outline:none;
}
.panel-body{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:18px;}
.panel-body::-webkit-scrollbar{width:3px;}
.p-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:8px;}
.chip-row{display:flex;flex-wrap:wrap;gap:5px;}
.chip{
  padding:5px 12px;border:1.5px solid var(--border);
  border-radius:8px;font-size:12px;font-weight:500;
  cursor:pointer;background:transparent;color:var(--sub);
  transition:all .15s;
}
.chip:hover{border-color:var(--border2);color:var(--text);}
.chip.sel{border-color:var(--primary);background:var(--primary-light);color:var(--primary);}
.panel-textarea{
  width:100%;min-height:100px;background:var(--bg);
  border:1.5px solid var(--border);border-radius:10px;
  padding:10px 12px;font-size:13px;color:var(--text);
  outline:none;resize:none;line-height:1.6;transition:border-color .15s;
}
.panel-textarea:focus{border-color:var(--border2);}
.panel-foot{
  padding:12px 20px;border-top:1px solid var(--border);
  display:flex;justify-content:flex-end;
}
.btn-delete{
  padding:6px 14px;border:1.5px solid var(--border);
  background:transparent;border-radius:8px;
  font-size:12px;color:var(--muted);cursor:pointer;transition:all .15s;
}
.btn-delete:hover{border-color:#f8c8c8;background:#fff0f0;color:var(--red);}

/* ── 퀵 모달 ── */
.quick-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.15);
  z-index:200;display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .15s;
  backdrop-filter:blur(2px);
}
.quick-overlay.show{opacity:1;pointer-events:all;}
.quick-modal{
  background:var(--white);border:1.5px solid var(--border);
  border-radius:16px;padding:20px;width:340px;
  box-shadow:0 24px 60px rgba(0,0,0,.12);
  transform:translateY(8px) scale(.97);transition:transform .18s;
}
.quick-overlay.show .quick-modal{transform:translateY(0) scale(1);}
.quick-header{display:flex;align-items:center;gap:7px;margin-bottom:12px;}
.quick-dot{width:8px;height:8px;border-radius:50%;}
.quick-label{font-size:12px;font-weight:600;color:var(--sub);}
.quick-input{
  width:100%;background:var(--bg);border:1.5px solid var(--border);
  border-radius:10px;padding:10px 14px;font-size:14px;color:var(--text);
  outline:none;margin-bottom:12px;transition:border-color .15s;
}
.quick-input:focus{border-color:var(--border2);}
.quick-actions{display:flex;justify-content:flex-end;gap:6px;}
.btn-cancel{
  padding:7px 14px;border:1.5px solid var(--border);
  background:transparent;border-radius:8px;
  font-size:12px;color:var(--sub);cursor:pointer;transition:all .15s;
}
.btn-cancel:hover{background:var(--bg);}
.btn-add{
  padding:7px 16px;border:none;background:var(--primary);
  border-radius:8px;font-size:12px;color:#fff;font-weight:600;
  cursor:pointer;transition:opacity .15s;
}
.btn-add:hover{opacity:.85;}

/* 마스코트 애니메이션 */
@keyframes mbounce{0%,100%{transform:scale(1) rotate(0)}40%{transform:scale(1.25) rotate(-6deg)}70%{transform:scale(1.1) rotate(4deg)}}
@keyframes mshake{0%,100%{transform:rotate(0)}20%{transform:rotate(-8deg)}40%{transform:rotate(8deg)}60%{transform:rotate(-5deg)}80%{transform:rotate(5deg)}}
.m-bounce{animation:mbounce .45s cubic-bezier(.34,1.56,.64,1);}
.m-shake{animation:mshake .35s ease;}
</style>
</head>
<body>

<!-- 헤더 -->
<header>
  <div class="logo-area">
    <div class="mascot-wrap" id="mascot-wrap">
      <img class="mascot-img" id="mascot-img" src="" alt="mascot" />
      <div class="mascot-badge" id="mascot-badge"></div>
    </div>
    <span class="logo-text">Catask</span>
    <span class="hdr-date" id="hdr-date"></span>
  </div>
  <div class="hdr-right">
    <div class="prog-wrap">
      <div class="prog-bar-bg"><div class="prog-bar-fill" id="prog-fill" style="width:0%"></div></div>
      <span class="prog-txt" id="prog-txt">0 / 0</span>
    </div>
    <button class="btn-new" onclick="openQuick('todo')">
      <span class="btn-new-icon">+</span> New Task
    </button>
  </div>
</header>

<!-- 보드 -->
<div class="board">
  <!-- To Do -->
  <div class="col col-todo">
    <div class="col-head">
      <div class="col-title-wrap"><span class="col-title">To Do</span></div>
      <span class="col-cnt" id="cnt-todo">0</span>
    </div>
    <div class="col-body" id="body-todo" data-col="todo"></div>
    <button class="col-add" onclick="openQuick('todo')">+ Add card</button>
  </div>
  <!-- In Progress -->
  <div class="col col-prog">
    <div class="col-head">
      <div class="col-title-wrap"><span class="col-title">In Progress</span></div>
      <span class="col-cnt" id="cnt-prog">0</span>
    </div>
    <div class="col-body" id="body-prog" data-col="prog"></div>
    <button class="col-add" onclick="openQuick('prog')">+ Add card</button>
  </div>
  <!-- Blocked -->
  <div class="col col-block">
    <div class="col-head">
      <div class="col-title-wrap">
        <span class="col-block-icon">⊘</span>
        <span class="col-title">Blocked</span>
      </div>
      <span class="col-cnt" id="cnt-block">0</span>
    </div>
    <div class="col-body" id="body-block" data-col="block"></div>
    <button class="col-add" onclick="openQuick('block')">+ Add card</button>
  </div>
  <!-- Done -->
  <div class="col col-done">
    <div class="col-head">
      <div class="col-title-wrap"><span class="col-title">Done</span></div>
      <span class="col-cnt" id="cnt-done">0</span>
    </div>
    <div class="col-body" id="body-done" data-col="done"></div>
    <button class="col-add" onclick="openQuick('done')">+ Add card</button>
  </div>
</div>

<!-- 상세 패널 -->
<div class="panel-overlay" id="panel-overlay">
  <div class="panel">
    <div class="panel-head">
      <button class="panel-close" onclick="closePanel()">×</button>
      <input class="panel-title-input" id="panel-title" placeholder="Card title" />
    </div>
    <div class="panel-body">
      <div>
        <div class="p-label">Status</div>
        <div class="chip-row" id="p-status"></div>
      </div>
      <div>
        <div class="p-label">Priority</div>
        <div class="chip-row" id="p-prio"></div>
      </div>
      <div>
        <div class="p-label">Tag</div>
        <div class="chip-row" id="p-tags"></div>
      </div>
      <div>
        <div class="p-label">Notes</div>
        <textarea class="panel-textarea" id="p-notes" placeholder="Key points, links, blockers..."></textarea>
      </div>
    </div>
    <div class="panel-foot">
      <button class="btn-delete" id="btn-delete">Delete card</button>
    </div>
  </div>
</div>

<!-- 퀵 추가 -->
<div class="quick-overlay" id="quick-overlay">
  <div class="quick-modal">
    <div class="quick-header">
      <div class="quick-dot" id="q-dot"></div>
      <span class="quick-label" id="q-col-name">To Do</span>
    </div>
    <input class="quick-input" id="quick-input" placeholder="What needs to be done?" />
    <div class="quick-actions">
      <button class="btn-cancel" onclick="closeQuick()">Cancel</button>
      <button class="btn-add" onclick="addCard()">Add Card</button>
    </div>
  </div>
</div>

// ── 상태 ──
var cards = [];
var nextId = 1;
var editingId = null;
var quickCol = 'todo';
var dragId = null;

var COL_NAMES = {todo:'To Do', prog:'In Progress', block:'Blocked', done:'Done'};
var COL_COLORS = {todo:'#8a95a3', prog:'#f59e0b', block:'#a83836', done:'#22c55e'};
var TAGS = ['Design','Dev','Content','Infra','Research','Meeting'];
var PRIOS = [{key:'high',label:'🔴 High'},{key:'med',label:'🟡 Med'},{key:'low',label:'⚪ Low'}];

// ── 저장/불러오기 ──
function save() {
  localStorage.setItem('gw5', JSON.stringify({cards:cards, nid:nextId}));
}
function load() {
  var r = localStorage.getItem('gw5');
  if (r) {
    try {
      var d = JSON.parse(r);
      cards = d.cards || [];
      nextId = d.nid || 1;
    } catch(e) {}
  }
}

// ── 렌더 ──
function render() {
  var total = cards.length;
  var done = cards.filter(function(c) { return c.col === 'done'; }).length;

  ['todo','prog','block','done'].forEach(function(col) {
    var body = document.getElementById('body-' + col);
    var filtered = cards.filter(function(c) { return c.col === col; });

    body.innerHTML = '';

    if (filtered.length === 0) {
      var empty = document.createElement('div');
      empty.className = 'col-empty';
      var eimg = document.createElement('img');
      eimg.className = 'col-empty-img';
      eimg.src = MASCOT_SRC;
      var etxt = document.createElement('span');
      etxt.className = 'col-empty-txt';
      etxt.textContent = 'Empty';
      empty.appendChild(eimg);
      empty.appendChild(etxt);
      body.appendChild(empty);
    }

    filtered.forEach(function(card) {
      body.appendChild(makeCard(card));
    });

    document.getElementById('cnt-' + col).textContent = filtered.length;
  });

  // 진행도
  document.getElementById('prog-txt').textContent = done + ' / ' + total;
  document.getElementById('prog-fill').style.width = (total ? Math.round(done/total*100) : 0) + '%';

  // 마스코트 표정
  updateMascot(total, done);
}

function updateMascot(total, done) {
  var img = document.getElementById('mascot-img');
  var badge = document.getElementById('mascot-badge');
  if (total === 0) {
    img.style.filter = 'none';
    img.style.borderColor = 'var(--border)';
    badge.style.display = 'none';
    return;
  }
  var pct = done / total;
  if (pct >= 0.7) {
    img.style.filter = 'brightness(1.15) saturate(1.2)';
    img.style.borderColor = '#22c55e';
    badge.textContent = '✨';
    badge.style.display = 'block';
  } else if (pct <= 0.2 && total >= 3) {
    img.style.filter = 'saturate(1.4) brightness(.88)';
    img.style.borderColor = '#a83836';
    badge.textContent = '💢';
    badge.style.display = 'block';
  } else {
    img.style.filter = 'none';
    img.style.borderColor = 'var(--border)';
    badge.textContent = '🤓';
    badge.style.display = 'block';
  }
}

function makeCard(card) {
  var el = document.createElement('div');
  el.className = 'card';
  el.draggable = true;
  el.dataset.id = card.id;

  el.addEventListener('dragstart', function(e) {
    dragId = card.id;
    setTimeout(function() { el.classList.add('dragging'); }, 0);
    e.dataTransfer.effectAllowed = 'move';
  });
  el.addEventListener('dragend', function() {
    el.classList.remove('dragging');
    dragId = null;
    document.querySelectorAll('.col-body').forEach(function(b) {
      b.classList.remove('drag-over');
    });
  });
  el.addEventListener('click', function() { openPanel(card.id); });

  // 진행 중 라인
  if (card.col === 'prog') {
    var line = document.createElement('div');
    line.className = 'prog-line';
    el.appendChild(line);
  }

  // 탑 (태그 + 열기버튼)
  var top = document.createElement('div');
  top.className = 'card-top';

  if (card.tag) {
    var tag = document.createElement('span');
    tag.className = 'card-tag tag-' + card.tag;
    tag.textContent = card.tag.toUpperCase();
    top.appendChild(tag);
  } else {
    top.appendChild(document.createElement('span'));
  }

  var openBtn = document.createElement('button');
  openBtn.className = 'card-open-btn';
  openBtn.textContent = '↗';
  openBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    openPanel(card.id);
  });
  top.appendChild(openBtn);
  el.appendChild(top);

  // 타이틀
  var title = document.createElement('div');
  title.className = 'card-title' + (card.col === 'done' ? ' done-title' : '');
  title.textContent = card.title;
  el.appendChild(title);

  // 노트
  if (card.notes) {
    var notes = document.createElement('div');
    notes.className = 'card-notes';
    notes.textContent = card.notes;
    el.appendChild(notes);
  }

  // 푸터
  var hasFooter = card.priority === 'high' || card.col === 'done';
  if (hasFooter) {
    var footer = document.createElement('div');
    footer.className = 'card-footer';
    if (card.priority === 'high') {
      var prio = document.createElement('div');
      prio.className = 'card-prio-high';
      prio.innerHTML = '⚑ High Priority';
      footer.appendChild(prio);
    }
    if (card.col === 'done') {
      var doneBadge = document.createElement('div');
      doneBadge.className = 'card-done-badge';
      doneBadge.innerHTML = '✓ Done';
      footer.appendChild(doneBadge);
    }
    el.appendChild(footer);
  }

  return el;
}

// ── 컬럼 드래그 ──
document.querySelectorAll('.col-body').forEach(function(body) {
  body.addEventListener('dragover', function(e) {
    e.preventDefault();
    body.classList.add('drag-over');
  });
  body.addEventListener('dragleave', function(e) {
    if (!body.contains(e.relatedTarget)) {
      body.classList.remove('drag-over');
    }
  });
  body.addEventListener('drop', function(e) {
    e.preventDefault();
    body.classList.remove('drag-over');
    if (!dragId) return;
    var targetCol = body.dataset.col;
    var card = cards.find(function(c) { return c.id === dragId; });
    if (card && card.col !== targetCol) {
      card.col = targetCol;
      var mascot = document.getElementById('mascot-img');
      if (targetCol === 'done') {
        mascot.classList.remove('m-bounce');
        void mascot.offsetWidth;
        mascot.classList.add('m-bounce');
        setTimeout(function() { mascot.classList.remove('m-bounce'); }, 450);
      }
      if (targetCol === 'block') {
        mascot.classList.remove('m-shake');
        void mascot.offsetWidth;
        mascot.classList.add('m-shake');
        setTimeout(function() { mascot.classList.remove('m-shake'); }, 350);
      }
      save();
      render();
      if (editingId === dragId) renderPanelStatus(card);
    }
  });
});

// ── 퀵 추가 ──
function openQuick(col) {
  quickCol = col;
  document.getElementById('q-col-name').textContent = COL_NAMES[col];
  document.getElementById('q-dot').style.background = COL_COLORS[col];
  document.getElementById('quick-overlay').classList.add('show');
  setTimeout(function() { document.getElementById('quick-input').focus(); }, 80);
}
function closeQuick() {
  document.getElementById('quick-overlay').classList.remove('show');
  document.getElementById('quick-input').value = '';
}
function addCard() {
  var t = document.getElementById('quick-input').value.trim();
  if (!t) return;
  cards.push({id:nextId++, title:t, col:quickCol, priority:'low', tag:'', notes:''});
  save();
  render();
  closeQuick();
}
document.getElementById('quick-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') addCard();
  if (e.key === 'Escape') closeQuick();
});
document.getElementById('quick-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeQuick();
});

// ── 패널 ──
function openPanel(id) {
  var card = cards.find(function(c) { return c.id === id; });
  if (!card) return;
  editingId = id;
  document.getElementById('panel-title').value = card.title;
  document.getElementById('p-notes').value = card.notes || '';
  renderPanelStatus(card);
  renderPanelPrio(card);
  renderPanelTags(card);
  document.getElementById('panel-overlay').classList.add('show');
}
function renderPanelStatus(card) {
  var row = document.getElementById('p-status');
  row.innerHTML = '';
  Object.keys(COL_NAMES).forEach(function(s) {
    var btn = document.createElement('button');
    btn.className = 'chip' + (card.col === s ? ' sel' : '');
    btn.textContent = COL_NAMES[s];
    btn.onclick = function() {
      card.col = s;
      save(); render(); renderPanelStatus(card);
    };
    row.appendChild(btn);
  });
}
function renderPanelPrio(card) {
  var row = document.getElementById('p-prio');
  row.innerHTML = '';
  PRIOS.forEach(function(p) {
    var btn = document.createElement('button');
    btn.className = 'chip' + (card.priority === p.key ? ' sel' : '');
    btn.textContent = p.label;
    btn.onclick = function() {
      card.priority = p.key;
      save(); render(); renderPanelPrio(card);
    };
    row.appendChild(btn);
  });
}
function renderPanelTags(card) {
  var row = document.getElementById('p-tags');
  row.innerHTML = '';
  TAGS.forEach(function(t) {
    var btn = document.createElement('button');
    btn.className = 'chip' + (card.tag === t ? ' sel' : '');
    btn.textContent = t;
    btn.onclick = function() {
      card.tag = (card.tag === t) ? '' : t;
      save(); render(); renderPanelTags(card);
    };
    row.appendChild(btn);
  });
}
function closePanel() {
  if (editingId) {
    var card = cards.find(function(c) { return c.id === editingId; });
    if (card) {
      card.title = document.getElementById('panel-title').value.trim() || card.title;
      card.notes = document.getElementById('p-notes').value;
      save(); render();
    }
  }
  editingId = null;
  document.getElementById('panel-overlay').classList.remove('show');
}
document.getElementById('panel-overlay').addEventListener('click', function(e) {
  if (e.target === this) closePanel();
});
document.getElementById('btn-delete').addEventListener('click', function() {
  if (!editingId) return;
  cards = cards.filter(function(c) { return c.id !== editingId; });
  save(); render(); closePanel();
});

// ── 마스코트 클릭 ──
document.getElementById('mascot-wrap').addEventListener('click', function() {
  var m = document.getElementById('mascot-img');
  m.classList.remove('m-bounce');
  void m.offsetWidth;
  m.classList.add('m-bounce');
  setTimeout(function() { m.classList.remove('m-bounce'); }, 450);
});

// ── 날짜 ──
function setDate() {
  var now = new Date();
  var days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('hdr-date').textContent =
    days[now.getDay()] + ' ' + months[now.getMonth()] + ' ' + now.getDate();
}

// ── 키보드 ──
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') { closePanel(); closeQuick(); }
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault(); openQuick('todo');
  }
});

// ── 초기화 ──
load();
setDate();
render();
</script>
</body>
</html>
